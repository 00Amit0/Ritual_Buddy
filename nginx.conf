user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format extended '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        '"$http_x_forwarded_for" $request_time '
                        '"$upstream_response_time" "$upstream_addr"';
    access_log /var/log/nginx/access.log extended;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;

    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_req_zone $http_authorization zone=auth:10m rate=600r/m;
    limit_req_status 429;

    upstream auth_backend { server auth-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream user_backend { server user-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream pandit_backend { server pandit-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream booking_backend { server booking-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream search_backend { server search-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream payment_backend { server payment-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream notification_backend { server notification-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream review_backend { server review-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }
    upstream admin_backend { server admin-service:8000 max_fails=3 fail_timeout=30s; keepalive 16; }

    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            proxy_pass http://auth_backend/health;
        }

        location /metrics {
            access_log off;
            proxy_pass http://auth_backend/metrics;
        }

        location ~ ^/(docs|redoc|openapi.json)$ {
            proxy_pass http://auth_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /auth/ {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://auth_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /users/ {
            limit_req zone=auth burst=100 nodelay;
            proxy_pass http://user_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /pandits/ {
            limit_req zone=auth burst=100 nodelay;
            proxy_pass http://pandit_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /bookings/ {
            limit_req zone=auth burst=100 nodelay;
            proxy_pass http://booking_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /search/ {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://search_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /payments/ {
            proxy_pass http://payment_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /notifications/ {
            limit_req zone=auth burst=100 nodelay;
            proxy_pass http://notification_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /reviews/ {
            proxy_pass http://review_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location ^~ /admin/ {
            proxy_pass http://admin_backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }

        location / {
            return 404;
        }
    }
}
