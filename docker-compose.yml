      DATABASE_URL: postgresql+asyncpg://postgres:password@booking-postgres:5432/pandit_booking_db
      DB_AUTO_INIT: "false"
    command: alembic upgrade head
    depends_on:
      booking-postgres:
        condition: service_healthy
