version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      pandit-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      review-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
    networks:
      - pandit_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: auth-service
      ENABLED_ROUTERS: auth
      DATABASE_URL: postgresql+asyncpg://postgres:password@auth-postgres:5432/pandit_auth_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      KAFKA_BOOTSTRAP_SERVERS: event-bus:9092
      ELASTICSEARCH_URL: http://elasticsearch:9200
      DB_AUTO_INIT: "false"
      INSTANCE_NAME: auth-service
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      event-bus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips="*"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pandit_network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
